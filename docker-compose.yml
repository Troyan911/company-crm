services:

    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: crm_symfony_php
        volumes:
            - .:/var/www:cached
        working_dir: /var/www
        depends_on:
            - db

    nginx:
        image: nginx:latest
        container_name: crm_symfony_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    db:
        image: mysql:8.0
        container_name: crm_symfony_mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: symfony
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        ports:
            - "3306:3306"
        volumes:
            - database_data:/var/lib/mysql

volumes:
    database_data:
