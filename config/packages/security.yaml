security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        login:
            pattern: ^/api/login$
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
            security: false

        register:
            pattern: ^/api/register$
            stateless: true
            security: false

        public_api:
#            pattern: ^/api/(company|project|user)$
#            pattern: ^/api/(company|project|user)/?$
#            pattern: ^/api/(company|project|user)(/\d+)?/?$
            pattern: ^/api/(company|project|user)(/[^/]+)?/?$
            stateless: true
            security: false
        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            jwt: ~  # обробка JWT для всіх методів крім login/register

        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

    access_control:
        # POST/PUT/DELETE /api/company → тільки залогінені
        - { path: ^/api/company, roles: IS_AUTHENTICATED_FULLY, methods: [POST, PUT, DELETE] }

        # GET /api/company та /api/company/{id} доступні всім через public_api
        # не треба IS_AUTHENTICATED_ANONYMOUSLY тут

        # Всі інші /api/... → тільки JWT
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

#    access_control:
#        # GET /api/company та /api/company/{id} доступні завжди
#        - { path: ^/api/company, roles: IS_AUTHENTICATED_ANONYMOUSLY, methods: [GET] }
#
#        # POST/PUT/DELETE /api/company → тільки залогінені користувачі
#        - { path: ^/api/company, roles: IS_AUTHENTICATED_FULLY, methods: [POST, PUT, DELETE] }
#
#        # Всі інші /api/... запити потребують JWT
#        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }



