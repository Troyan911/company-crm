security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        login:
            pattern: ^/api/login$
            stateless: true
            security: false

        register:
            pattern: ^/api/register$
            stateless: true
            security: false

        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            jwt: ~

        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

    access_control:
        # PUBLIC GET for user/project/company
        - { path: ^/api/(user|project|company)(/\d+)?$, methods: [GET], roles: PUBLIC_ACCESS }

        # PROTECTED write for user/project/company
        - { path: ^/api/(user|project|company), methods: [POST, PUT, DELETE], roles: IS_AUTHENTICATED_FULLY }

        # everything else in api requires auth
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
